<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Expansion: Unlimited Void 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            cursor: none;
        }

        #canvas {
            display: block;
            background: radial-gradient(circle at center, #1a0033 0%, #000 70%);
        }

        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 1000;
            font-size: 18px;
            text-shadow: 0 0 10px #00ffff;
        }

        #handGesture {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1001;
            pointer-events: none;
        }

        .domain-active {
            animation: glow 1s infinite alternate;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 20px #00ffff; }
            100% { text-shadow: 0 0 40px #00ffff, 0 0 60px #ff00ff; }
        }

        #title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #fff;
            text-align: center;
            opacity: 0;
            z-index: 1002;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="controls">
        👆 Mouse move karke hand gesture banao<br>
        ✋ Domain Activation Gesture: Clockwise circle + Click!
    </div>
    
    <div id="handGesture">✋</div>
    <div id="title">DOMAIN EXPANSION<br><span style="font-size: 32px; color: #00ffff;">無量空処 - UNLIMITED VOID</span></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const handGesture = document.getElementById('handGesture');
        const title = document.getElementById('title');

        // Canvas setup
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let mouseX = 0, mouseY = 0;
        let particles = [];
        let domainActive = false;
        let gestureAngle = 0;
        let gesturePoints = [];
        let time = 0;

        // Particle class
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 3 + 1;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.hue = Math.random() * 60 + 240; // Cyan-Purple range
                this.brightness = 0.8;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
                this.hue += 1;
                this.brightness += 0.01;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);
                
                // Glow effect
                ctx.shadowColor = `hsl(${this.hue}, 100%, ${50 + this.brightness * 30}%)`;
                ctx.shadowBlur = 20;
                
                // Main particle
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size * 2);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, ${80 + this.brightness * 20}%, 0.9)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Mouse tracking
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            if (!domainActive) {
                gesturePoints.push({x: mouseX, y: mouseY, time: Date.now()});
                
                // Keep only recent points for gesture detection
                if (gesturePoints.length > 50) {
                    gesturePoints.shift();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (detectClockwiseCircle()) {
                activateDomain();
            }
        });

        // Gesture detection - Clockwise circle
        function detectClockwiseCircle() {
            if (gesturePoints.length < 20) return false;
            
            let centerX = 0, centerY = 0;
            let angles = [];
            
            // Find gesture center
            gesturePoints.forEach(p => {
                centerX += p.x;
                centerY += p.y;
            });
            centerX /= gesturePoints.length;
            centerY /= gesturePoints.length;
            
            // Calculate angles from center
            gesturePoints.forEach(p => {
                let angle = Math.atan2(p.y - centerY, p.x - centerX);
                angles.push(angle);
            });
            
            // Check if angles are increasing (clockwise circle)
            let totalChange = 0;
            for (let i = 1; i < angles.length; i++) {
                let delta = angles[i] - angles[i-1];
                if (delta < -Math.PI) delta += Math.PI * 2;
                if (delta > Math.PI) delta -= Math.PI * 2;
                totalChange += delta;
            }
            
            return Math.abs(totalChange) > Math.PI * 1.5;
        }

        // Domain Activation
        function activateDomain() {
            domainActive = true;
            handGesture.classList.add('domain-active');
            handGesture.style.opacity = '1';
            title.style.opacity = '1';
            
            // Explosion of particles
            for (let i = 0; i < 1000; i++) {
                particles.push(new Particle(mouseX, mouseY));
            }
            
            setTimeout(() => {
                title.style.opacity = '0';
            }, 5000);
        }

        // Animation loop
        function animate() {
            time++;
            
            // Clear canvas with trail effect
            ctx.fillStyle = 'rgba(0, 0, 20, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Background stars
            if (Math.random() < 0.3) {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5})`;
                ctx.beginPath();
                ctx.arc(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    Math.random() * 2,
                    0, Math.PI * 2
                );
                ctx.fill();
            }
            
            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // Continuous particle emission when domain active
            if (domainActive) {
                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(
                        mouseX + (Math.random() - 0.5) * 100,
                        mouseY + (Math.random() - 0.5) * 100
                    ));
                }
                
                // Void distortion effect
                ctx.save();
                ctx.translate(canvas.width/2, canvas.height/2);
                ctx.rotate(time * 0.001);
                
                const distortionGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 300);
                distortionGradient.addColorStop(0, 'rgba(0, 255, 255, 0.1)');
                distortionGradient.addColorStop(0.5, 'rgba(255, 0, 255, 0.05)');
                distortionGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.fillStyle = distortionGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 300 + Math.sin(time * 0.05) * 50, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            requestAnimationFrame(animate);
        }

        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Start animation
        animate();

        // Touch support for mobile
        let touchStartX, touchStartY;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            if (Math.abs(e.changedTouches[0].clientX - touchStartX) < 50 &&
                Math.abs(e.changedTouches[0].clientY - touchStartY) < 50) {
                if (detectClockwiseCircle()) {
                    activateDomain();
                }
            }
        });
    </script>
</body>
</html>
